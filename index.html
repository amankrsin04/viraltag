<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

<body>

<div class="container">

<div class="hero">
<h1>🚀 ViralTag AI</h1>
<p>AI + ML Powered Viral Hashtag Research Platform</p>
</div>

<div class="card">

<div class="input-wrap">
<input id="topic" placeholder="Enter video topic (fitness, trading, motivation, coding...)">
<button onclick="generate()">Analyze</button>
</div>

<div class="stats">
<div class="stat">
<h3>Viral Score</h3>
<span id="viralScore">--</span>
</div>

<div class="stat">
<h3>Predicted Reach</h3>
<span id="reach">--</span>
</div>

<div class="stat">
<h3>Competition</h3>
<span id="competition">--</span>
</div>
</div>

<div class="progress">
<div class="progress-fill" id="bar"></div>
</div>

</div>

<div id="loading" class="loading">
🤖 AI Analyzing Trends...
</div>

<div id="results"></div>

</div>

<div class="toast" id="toast">
Copied
</div>

<script>

function showToast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";

setTimeout(()=>{
t.style.display="none";
},1500);
}

function copy(text){
navigator.clipboard.writeText(text);
showToast("Copied");
}

function buildTags(topic,type,count){

const words=[
"viral","trend","explore","reels","growth",
"marketing","creator","success","tips","business",
"strategy","daily","academy","community","insider",
"hacks","results","expert","coach","future"
];

let arr=[];

for(let i=0;i<count;i++){

const tag="#" +
topic.replace(/\s+/g,'') +
words[Math.floor(Math.random()*words.length)];

arr.push(tag);
}

return arr;
}

function renderTags(tags,min,max){

return tags.map(tag=>{

let reach=Math.floor(
Math.random()*(max-min)+min
).toLocaleString();

return `
<div class="tag" onclick="copy('${tag}')">
${tag}
<small>${reach} reach</small>
</div>
`;

}).join("");
}

function generate(){

const topic=document.getElementById("topic").value.trim();

if(!topic){
alert("Enter a topic");
return;
}

document.getElementById("loading").style.display="block";
document.getElementById("results").innerHTML="";

setTimeout(()=>{

const viral=buildTags(topic,"viral",10);
const growth=buildTags(topic,"growth",10);
const niche=buildTags(topic,"niche",10);

const score=Math.floor(Math.random()*20)+80;

document.getElementById("viralScore").innerText=score+"/100";
document.getElementById("reach").innerText=
(Math.floor(Math.random()*4)+1)+"M+";

document.getElementById("competition").innerText=
["Low","Medium","High"][Math.floor(Math.random()*3)];

document.getElementById("bar").style.width=
score+"%";

const caption=
`🔥 ${topic.toUpperCase()} TIPS

Want better results in ${topic}?

This strategy is helping creators grow faster than ever.

Save this post and follow for more valuable content.

#${topic.replace(/\s+/g,'')}`;

document.getElementById("results").innerHTML=`

<div class="grid">

<div class="box">
<h2>🔥 Viral Hashtags</h2>
<div class="tags">
${renderTags(viral,500000,5000000)}
</div>
</div>

<div class="box">
<h2>📈 Growth Hashtags</h2>
<div class="tags">
${renderTags(growth,50000,500000)}
</div>
</div>

<div class="box">
<h2>🎯 Niche Hashtags</h2>
<div class="tags">
${renderTags(niche,5000,50000)}
</div>
</div>

</div>

<div class="caption">

<h2>✍ AI Generated Caption</h2>

<br>

${caption}

<button class="copy-btn"
onclick="copy(\`${caption}\`)">
Copy Caption
</button>

</div>

<div class="grid">

<div class="box">
<h2>⏰ Best Posting Time</h2>
<p>7 PM - 10 PM</p>
</div>

<div class="box">
<h2>🚀 Growth Tip</h2>
<p>Use a strong hook within the first 3 seconds and combine niche + viral hashtags.</p>
</div>

<div class="box">
<h2>📋 Copy Everything</h2>

<button class="copy-btn"
onclick="copy('${[...viral,...growth,...niche].join(" ")}')">
Copy All 30 Hashtags
</button>

</div>

</div>
`;

document.getElementById("loading").style.display="none";

},1500);

}
</script>

</body>
</html>
